name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.4'
  RUST_VERSION: '1.96.0'

jobs:
  # ===== 质量门禁：lint + test（所有事件都跑）=====
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked

      - name: Generate FRB bindings
        run: flutter_rust_bridge_codegen generate

      - name: Flutter pub get
        run: flutter pub get

      - name: Rust format check
        working-directory: rust
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: rust
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust test
        working-directory: rust
        run: cargo test

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  # ===== 全平台构建：仅 push 到 main 或打 tag 时跑 =====
  build:
    needs: lint-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
          - target: windows
            os: windows-latest
          - target: macos
            os: macos-latest
          - target: linux
            os: ubuntu-latest
          - target: web
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked

      - name: Generate FRB bindings
        run: flutter_rust_bridge_codegen generate

      - name: Flutter pub get
        run: flutter pub get

      # ===== Linux 依赖 =====
      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # ===== Android NDK =====
      - name: Setup Android NDK
        if: matrix.target == 'android'
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Add Rust Android targets
        if: matrix.target == 'android'
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      # ===== Web: wasm-pack =====
      - name: Install wasm-pack
        if: matrix.target == 'web'
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # ===== 构建 =====
      - name: Build Android APK
        if: matrix.target == 'android'
        run: flutter build apk --release

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      - name: Build Linux
        if: matrix.target == 'linux'
        run: flutter build linux --release

      - name: Build Web
        if: matrix.target == 'web'
        run: flutter build web --release

      # ===== 打包产物 =====
      - name: Archive Android
        if: matrix.target == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: s-toolbox-rs-android
          path: build/app/outputs/flutter-apk/*.apk

      - name: Archive Windows
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: s-toolbox-rs-windows
          path: build/windows/x64/runner/Release/

      - name: Archive macOS
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: s-toolbox-rs-macos
          path: build/macos/Build/Products/Release/*.app

      - name: Archive Linux
        if: matrix.target == 'linux'
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../s-toolbox-rs-linux.tar.gz .

      - name: Upload Linux
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: s-toolbox-rs-linux
          path: s-toolbox-rs-linux.tar.gz

      - name: Archive Web
        if: matrix.target == 'web'
        uses: actions/upload-artifact@v4
        with:
          name: s-toolbox-rs-web
          path: build/web
